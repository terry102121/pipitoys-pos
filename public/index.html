<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威志將庫存管理系統 - PIPI TOYS 專用版</title>
    <style>
        /* 復刻相片中的經典 Windows 系統配色與樣式 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "MS Sans Serif", "微軟正黑體", sans-serif; font-size: 14px; }
        body { background-color: #55aaaa; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 雲端安全驗證層 */
        .auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:9999; }
        .auth-box { background: #d4d0c8; border: 2px outset #fff; padding: 25px; width: 360px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); text-align: center; }
        .auth-box h3 { margin-bottom: 15px; color: #000080; }
        .auth-box input { width: 100%; padding: 8px; margin: 10px 0; border: 2px inset #fff; background: white; }
        .auth-box button { padding: 8px 20px; background: #d4d0c8; border: 2px outset #fff; font-weight: bold; cursor: pointer; }

        /* 主視窗外殼 */
        .window-container { background-color: #d4d0c8; border: 3px outset #fff; width: 1024px; height: 740px; display: flex; flex-direction: column; position: relative; box-shadow: 3px 3px 15px rgba(0,0,0,0.3); }
        .window-title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .window-body { flex: 1; padding: 10px; position: relative; background-color: #d4d0c8; }

        /* 頂部選單文字列 */
        .menu-text-bar { background: #d4d0c8; padding: 3px 10px; border-bottom: 1px solid #808080; color: black; display: flex; gap: 15px; font-size: 13px; }

        /* --- 畫面 1：主畫面選單外觀 --- */
        #main-menu-screen { display: block; width: 100%; height: 100%; }
        .erp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #d4d0c8; padding: 15px; border: 2px inset #fff; }
        .erp-btn { background: #e0deda; border: 2px outset #fff; color: #0000ff; text-align: left; padding: 8px 10px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; }
        .erp-btn:active { border: 2px inset #fff; }
        .brand-center-box { text-align: center; margin-top: 60px; border: 2px inset #fff; padding: 40px; background: #e6e6e6; }
        .brand-title { font-size: 48px; color: #008000; font-family: "Times New Roman", serif; font-weight: bold; letter-spacing: 5px; }
        .btn-exit-main { background: #e0deda; border: 2px outset #fff; color: #ff0000; font-size: 20px; font-weight: bold; padding: 10px 30px; margin-top: 20px; cursor: pointer; }

        /* --- 畫面 2 & 3：銷貨管理作業外觀 --- */
        #sales-screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .info-top-row { display: flex; justify-content: space-between; padding: 3px 5px; background: #d4d0c8; font-weight: bold; border-bottom: 1px solid #808080; }
        .form-header-area { border: 2px inset #fff; padding: 10px; margin-bottom: 5px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #cbd2d6; }
        .form-group { display: flex; align-items: center; gap: 5px; }
        .form-group label { font-weight: bold; color: #000080; white-space: nowrap; }
        .form-group input, .form-group select { padding: 3px; border: 2px inset #fff; background: white; width: 100%; }
        
        /* 產品資料表格 */
        .table-container { flex: 1; overflow-y: auto; background: white; border: 2px inset #fff; min-height: 240px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #d4d0c8; border: 1px solid #808080; padding: 6px; font-weight: bold; position: sticky; top: 0; color: black; }
        td { border: 1px solid #e0e0e0; padding: 5px; background: white; }
        .yellow-col { background-color: #ffffaa; text-align: center; font-weight: bold; }

        /* 下方加總與付款區 */
        .summary-footer-area { border: 2px inset #fff; padding: 10px; margin-top: 5px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #cbd2d6; }

        /* 底部功能按鈕列 */
        .action-button-bar { display: flex; gap: 2px; margin-top: 8px; background: #d4d0c8; border: 2px inset #fff; padding: 4px; }
        .act-btn { background: #cbd2d6; border: 2px outset #fff; color: #0000ff; padding: 6px 12px; font-weight: bold; cursor: pointer; min-width: 65px; text-align: center; }
        .act-btn:active { border: 2px inset #fff; }
        .act-btn.disabled { color: #808080; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 1. 系統環境密碼安全驗證 -->
    <div id="site-auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h3>威志將網路安全驗證</h3>
            <p style="font-size: 12px; color: #404040;">請輸入網頁系統環境通關密碼</p>
            <input type="password" id="site-password" placeholder="請輸入密碼">
            <button onclick="verifySiteAccess()">確認通關</button>
        </div>
    </div>

    <!-- 2. 員工代號帳密登入層 -->
    <div id="login-overlay" class="auth-overlay" style="display: none;">
        <div class="auth-box">
            <h3>PIPI TOYS 員工系統登入</h3>
            <input type="text" id="emp-id" placeholder="員工代碼 (4位碼，例如 0001)">
            <input type="password" id="emp-password" placeholder="登入密碼 (6位碼，例如 000000)">
            <button onclick="loginSystem()">登入系統</button>
        </div>
    </div>

    <!-- 3. ERP 系統主外殼 -->
    <div class="window-container">
        <div class="window-title-bar">
            <span>威志將庫存管理系統 - [0422317599]</span>
            <span style="font-size: 12px;">X</span>
        </div>
        
        <div class="menu-text-bar">
            <span>1.基本資料</span> <span>2.產品庫存</span> <span>3.進貨管理</span> <span>4.銷貨管理</span> <span>5.帳款管理</span> <span>6.銷售分析</span> <span>7.結構管理</span> <span>8.系統維護</span>
        </div>

        <div class="window-body">
            
            <!-- ================= 畫面 1：主功能畫面選單 ================= -->
            <div id="main-menu-screen">
                <div class="erp-grid">
                    <button class="erp-btn">1.公司資料設定</button>
                    <button class="erp-btn">7.進貨管理作業</button>
                    <!-- 按下 9. 銷貨管理作業 進入結帳畫面 -->
                    <button class="erp-btn" style="color: #ff0000; background: #ffffcc;" onclick="openSalesScreen()">9.銷貨管理作業</button>
                    <button class="erp-btn">D.客戶 對帳單</button>
                    <button class="erp-btn">J.廠商 對帳單</button>
                    
                    <button class="erp-btn">2.客戶基本資料</button>
                    <button class="erp-btn">8.進貨退回作業</button>
                    <button class="erp-btn">A.銷貨退回作業</button>
                    <button class="erp-btn">E.目前未收查印</button>
                    <button class="erp-btn">K.目前未付查印</button>
                    
                    <button class="erp-btn">3.廠商基本資料</button>
                    <div style="grid-column: span 2;"></div>
                    <button class="erp-btn">F.應收帳款銷帳</button>
                    <button class="erp-btn">L.應付帳款銷帳</button>
                    
                    <button class="erp-btn">4.員工基本資料</button>
                    <div style="grid-column: span 2;"></div>
                    <button class="erp-btn">G.收款狀況查印</button>
                    <button class="erp-btn">M.付款狀況查印</button>
                    
                    <button class="erp-btn">5.產品基本資料</button>
                    <div style="grid-column: span 2;"></div>
                    <button class="erp-btn">H.月營業分析</button>
                    <button class="erp-btn">N.進退記錄查印</button>
                    
                    <button class="erp-btn">6.條碼資料編修</button>
                    <div style="grid-column: span 2;"></div>
                    <button class="erp-btn">I.銷貨帳 查印</button>
                    <button class="erp-btn">O.進貨帳 查印</button>
                </div>

                <div class="brand-center-box">
                    <div class="brand-title">PIPI TOYS</div>
                    <button class="btn-exit-main" onclick="alert('安全登出！')">離 開</button>
                </div>
            </div>

            <!-- ================= 畫面 2 & 3：銷貨管理作業系統 ================= -->
            <div id="sales-screen">
                <!-- 狀態資訊列 -->
                <div class="info-top-row">
                    <div>機台：A &nbsp;&nbsp;&nbsp; 使用者：<span id="current-user-span">PIPI</span></div>
                    <div style="color: #000080; font-size:16px;">銷貨管理作業</div>
                    <div>日期：115年07月14日</div>
                </div>

                <!-- 單據欄位區 -->
                <div class="form-header-area">
                    <div class="form-group">
                        <label>客戶代碼*</label>
                        <input type="text" id="form-customer" value="零售" readonly>
                    </div>
                    <div class="form-group">
                        <label>對帳月盤</label>
                        <input type="text" style="width:50px;" value="115" readonly>
                        <input type="text" style="width:40px;" value="7" readonly>
                    </div>
                    <div class="form-group">
                        <label>貨運方式</label>
                        <select id="form-shipment" disabled>
                            <option value="店面直接購買">店面直接購買</option>
                            <option value="線上網拍">線上網拍</option>
                            <option value="露天">露天</option>
                            <option value="蝦皮">蝦皮</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="text" id="form-date" value="0115/07/14" readonly>
                    </div>
                    <div class="form-group">
                        <label>銷售人員</label>
                        <input type="text" id="form-staff" value="PIPI" readonly>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label style="color:red; font-weight:bold;">[刷條碼區]</label>
                        <input type="text" id="barcode-scanner-input" placeholder="按[新增]後在此刷條碼或輸入自編碼..." onkeypress="handleBarcodeScan(event)" disabled style="background:#e0e0e0;">
                    </div>
                    <div class="form-group">
                        <label>單號</label>
                        <input type="text" id="form-sheet-id" value="115070535" readonly style="color:brown; font-weight:bold;">
                    </div>
                </div>

                <!-- 商品表格明細 (滾動無限排) -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 40px;">序</th>
                                <th style="width: 130px;">產品代碼</th>
                                <th>產品名稱</th>
                                <th style="width: 80px;">分類</th>
                                <th style="width: 60px;">總庫</th>
                                <th style="width: 60px;">存量</th>
                                <th style="width: 50px;">單位</th>
                                <th style="width: 70px;">數量</th>
                                <th style="width: 90px;">單價</th>
                                <th style="width: 100px;">小計</th>
                            </tr>
                        </thead>
                        <tbody id="sales-item-table-body">
                            <!-- 資料動態生成 -->
                        </tbody>
                    </table>
                </div>

                <!-- 下方會計加總金流欄位 -->
                <div class="summary-footer-area">
                    <div>
                        <div class="form-group" style="margin-bottom:4px;"><label>銷貨額</label><input type="text" id="summary-subtotal" value="0.00" readonly></div>
                        <div class="form-group" style="margin-bottom:4px;"><label>稅 額</label><input type="text" value="0.00" readonly></div>
                        <div class="form-group"><label>合 計</label><input type="text" id="summary-total" value="0.00" readonly style="color:red; font-weight:bold;"></div>
                    </div>
                    <div>
                        <div class="form-group" style="margin-bottom:4px;">
                            <label>付款 1</label>
                            <select id="pay-method-1" onchange="recalculatePricesWithFee()" disabled>
                                <option value="現金">現金</option>
                                <option value="轉帳">轉帳</option>
                                <option value="信用卡">信用卡</option>
                                <option value="悠遊卡">悠遊卡</option>
                                <option value="LINE Pay">LINE Pay</option>
                                <option value="橘子支付">橘子支付</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:4px;"><label>付款 2</label><input type="text" readonly></div>
                        <div class="form-group"><label>付款 3</label><input type="text" value="折讓" readonly></div>
                    </div>
                    <div>
                        <div class="form-group" style="margin-bottom:4px;"><label>總數量</label><input type="text" id="summary-total-qty" value="0" readonly></div>
                        <div class="form-group" style="margin-bottom:4px;"><label>折 讓</label><input type="text" value="0" readonly></div>
                        <div class="form-group"><label>應 收</label><input type="text" id="summary-payable" value="0.00" readonly style="background:#000; color:#00ff00; font-family:monospace; font-size:16px; font-weight:bold;"></div>
                    </div>
                </div>

                <!-- 底部經典功能按鈕列 (對應畫面2、3) -->
                <div class="action-button-bar">
                    <button class="act-btn" id="btn-first" onclick="navBill('first')">極頭</button>
                    <button class="act-btn" id="btn-prev" onclick="navBill('prev')">上筆</button>
                    <button class="act-btn" id="btn-next" onclick="navBill('next')">下筆</button>
                    <button class="act-btn" id="btn-last" onclick="navBill('last')">極尾</button>
                    <button class="act-btn disabled">查詢</button>
                    <button class="act-btn disabled">列印</button>
                    <button class="act-btn" id="btn-add" onclick="clickAddInvoice()" style="color:brown;">新增</button>
                    <button class="act-btn disabled" id="btn-modify">修改</button>
                    <button class="act-btn disabled" id="btn-delete">刪除</button>
                    <button class="act-btn" id="btn-save" onclick="clickSaveInvoice()" style="color:green;">儲存</button>
                    <button class="act-btn" id="btn-cancel" onclick="clickCancelInvoice()">放棄</button>
                    <button class="act-btn" onclick="closeSalesScreen()" style="color:red;">離開</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 系統安全防護與模擬歷史資料庫
        let siteUnlocked = false;
        let loggedInStaff = "";
        
        // 模擬歷史銷售資料庫 (用來實現 畫面2 的「上筆/下筆」翻閱效果)
        let mockDatabase = [
            {
                sheet_id: "115070533",
                date: "0115/07/12",
                staff: "0001",
                customer: "零售",
                shipment: "店面直接購買",
                payment: "現金",
                items: [
                    { barcode: "471001", name: "超級賽亞人公仔", type: "玩具", stock: 12, unit: "盒", qty: 1, basePrice: 990 }
                ]
            },
            {
                sheet_id: "115070534",
                date: "0115/07/13",
                staff: "0001",
                customer: "零售",
                shipment: "蝦皮",
                payment: "LINE Pay", // 會自動算1.03
                items: [
                    { barcode: "471002", name: "庫柏力克熊盲盒", type: "盲盒", stock: 5, unit: "片", qty: 1, basePrice: 1890 },
                    { barcode: "471001", name: "超級賽亞人公仔", type: "玩具", stock: 11, unit: "盒", qty: 1, basePrice: 990 }
                ]
            }
        ];

        let currentRecordIndex = 1; // 預設停在最新的歷史單據
        let isAddingMode = false;   // 判斷是否按下了「新增」進入畫面 3
        let newCartItems = [];      // 新增模式下的即時購物車

        // 1. 環境安全驗證
        function verifySiteAccess() {
            const pw = document.getElementById('site-password').value;
            if (pw === 'Pipi25508846') {
                siteUnlocked = true;
                document.getElementById('site-auth-overlay').style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            } else {
                alert('網站通關密碼錯誤！');
            }
        }

        // 2. 員工代號登入
        function loginSystem() {
            const id = document.getElementById('emp-id').value.trim();
            const pw = document.getElementById('emp-password').value;
            if (id && pw) {
                loggedInStaff = id;
                document.getElementById('current-user-span').innerText = id;
                document.getElementById('form-staff').value = id;
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                alert('請完整輸入員工帳號與密碼！');
            }
        }

        // 開啟銷貨管理作業畫面 (畫面 1 -> 畫面 2)
        function openSalesScreen() {
            document.getElementById('main-menu-screen').style.display = 'none';
            document.getElementById('sales-screen').style.display = 'flex';
            isAddingMode = false;
            showRecord();
        }

        // 關閉回到主選單
        function closeSalesScreen() {
            document.getElementById('sales-screen').style.display = 'none';
            document.getElementById('main-menu-screen').style.display = 'block';
        }

        // 渲染指定銷售紀錄 (瀏覽模式 - 畫面 2)
        function showRecord() {
            if (mockDatabase.length === 0) return;
            const record = mockDatabase[currentRecordIndex];
            
            // 填入表單欄位
            document.getElementById('form-sheet-id').value = record.sheet_id;
            document.getElementById('form-date').value = record.date;
            document.getElementById('form-staff').value = record.staff;
            document.getElementById('form-customer').value = record.customer;
            document.getElementById('form-shipment').value = record.shipment;
            document.getElementById('pay-method-1').value = record.payment;

            // 鎖定輸入欄位
            document.getElementById('barcode-scanner-input').disabled = true;
            document.getElementById('barcode-scanner-input').style.backgroundColor = "#e0e0e0";
            document.getElementById('form-shipment').disabled = true;
            document.getElementById('pay-method-1').disabled = true;

            // 渲染表格資料
            renderTableRows(record.items, record.payment);
            
            // 更新導覽按鈕狀態
            document.getElementById('btn-first').classList.remove('disabled');
            document.getElementById('btn-prev').classList.remove('disabled');
            document.getElementById('btn-next').classList.remove('disabled');
            document.getElementById('btn-last').classList.remove('disabled');
        }

        // 翻頁導覽控制
        function navBill(action) {
            if (isAddingMode) return; // 新增模式中不能翻頁
            if (action === 'first') currentRecordIndex = 0;
            if (action === 'last') currentRecordIndex = mockDatabase.length - 1;
            if (action === 'prev' && currentRecordIndex > 0) currentRecordIndex--;
            if (action === 'next' && currentRecordIndex < mockDatabase.length - 1) currentRecordIndex++;
            showRecord();
        }

        // 按下【新增】按鈕 (進入畫面 3：全部清空，進入編輯)
        function clickAddInvoice() {
            isAddingMode = true;
            newCartItems = [];
            
            // 清空並解鎖欄位
            document.getElementById('form-sheet-id').value = "自動編號中...";
            document.getElementById('form-date').value = "0115/07/14";
            document.getElementById('form-shipment').disabled = false;
            document.getElementById('pay-method-1').disabled = false;
            document.getElementById('pay-method-1').value = "現金"; // 預設現金
            
            // 啟用條碼輸入區
            const scanner = document.getElementById('barcode-scanner-input');
            scanner.disabled = false;
            scanner.style.backgroundColor = "#ffffff";
            scanner.value = "";
            scanner.focus();

            // 禁用翻頁按鈕
            document.getElementById('btn-first').classList.add('disabled');
            document.getElementById('btn-prev').classList.add('disabled');
            document.getElementById('btn-next').classList.add('disabled');
            document.getElementById('btn-last').classList.add('disabled');

            // 渲染空的表格
            renderTableRows([], "現金");
        }

        // 處理條碼刷入
        function handleBarcodeScan(e) {
            if (e.key !== 'Enter') return;
            const code = e.target.value.trim();
            if (!code) return;
            e.target.value = "";

            // 模擬向雲端商品庫搜尋
            let foundProd = {
                barcode: code,
                name: code === "471001" ? "超級賽亞人公仔" : (code === "471002" ? "庫柏力克熊盲盒" : "雲端自編新產品"),
                type: "公仔",
                stock: 99,
                unit: "盒",
                basePrice: code === "471001" ? 990 : (code === "471002" ? 1890 : 500)
            };

            // 檢查是否已在購物車中
            const exist = newCartItems.find(item => item.barcode === foundProd.barcode);
            if (exist) {
                exist.qty++;
            } else {
                newCartItems.push({
                    barcode: foundProd.barcode,
                    name: foundProd.name,
                    type: foundProd.type,
                    stock: foundProd.stock,
                    unit: foundProd.unit,
                    qty: 1,
                    basePrice: foundProd.basePrice
                });
            }

            const currentPayment = document.getElementById('pay-method-1').value;
            renderTableRows(newCartItems, currentPayment);
        }

        // 切換付款方式時，即時重新計算手續費
        function recalculatePricesWithFee() {
            if (!isAddingMode) return;
            const currentPayment = document.getElementById('pay-method-1').value;
            renderTableRows(newCartItems, currentPayment);
        }

        // 核心渲染與 1.03 倍手續費計算引擎
        function renderTableRows(items, paymentMethod) {
            const tbody = document.getElementById('sales-item-table-body');
            tbody.innerHTML = '';
            
            // 判斷是否需要乘以 1.03
            const needFee = (paymentMethod === '信用卡' || paymentMethod === '悠遊卡' || paymentMethod === 'LINE Pay' || paymentMethod === '橘子支付');
            
            let totalAmount = 0;
            let totalQty = 0;

            // 填滿 8 排（保持跟畫面一樣的固定表格排數美觀）
            const displayRowCount = Math.max(items.length, 8);

            for (let i = 0; i < displayRowCount; i++) {
                const item = items[i];
                if (item) {
                    // 計算單價與小計：若是卡片/行動支付，精準乘以 1.03 並四捨五入
                    const finalPrice = needFee ? Math.round(item.basePrice * 1.03) : item.basePrice;
                    const subtotal = finalPrice * item.qty;
                    
                    totalAmount += subtotal;
                    totalQty += item.qty;

                    tbody.innerHTML += `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${item.barcode}</td>
                            <td>${item.name}</td>
                            <td>${item.type}</td>
                            <td class="yellow-col">${item.stock}</td>
                            <td>${item.stock - item.qty}</td>
                            <td>${item.unit}</td>
                            <td>${item.qty}</td>
                            <td>$${finalPrice}</td>
                            <td style="font-weight:bold;">$${subtotal}</td>
                        </tr>
                    `;
                } else {
                    // 空白留白行
                    tbody.innerHTML += `
                        <tr>
                            <td>${i + 1}</td> <td></td> <td></td> <td></td> <td class="yellow-col"></td> <td></td> <td></td> <td></td> <td></td> <td></td>
                        </tr>
                    `;
                }
            }

            // 更新下方金額看板
            document.getElementById('summary-subtotal').value = totalAmount.toFixed(2);
            document.getElementById('summary-total').value = totalAmount.toFixed(2);
            document.getElementById('summary-total-qty').value = totalQty;
            document.getElementById('summary-payable').value = `$ ${totalAmount.toLocaleString()}`;
        }

        // 按下【儲存】存檔
        function clickSaveInvoice() {
            if (!isAddingMode) { alert("請先點擊 [新增] 開始一筆新結帳！"); return; }
            if (newCartItems.length === 0) { alert("購物車內無商品，無法儲存！"); return; }

            const finalPayment = document.getElementById('pay-method-1').value;
            const nextId = "115070" + (534 + mockDatabase.length);
            
            // 將新訂單存入雲端模擬資料庫
            mockDatabase.push({
                sheet_id: nextId,
                date: "0115/07/14",
                staff: loggedInStaff || "PIPI",
                customer: "零售",
                shipment: document.getElementById('form-shipment').value,
                payment: finalPayment,
                items: [...newCartItems]
            });

            alert(`🎉 銷貨單 ${nextId} 雲端同步儲存成功！`);
            isAddingMode = false;
            currentRecordIndex = mockDatabase.length - 1; // 跳到剛剛存好的這筆
            showRecord();
        }

        // 按下【放棄】
        function clickCancelInvoice() {
            if (!isAddingMode) return;
            if (confirm("確定放棄目前輸入的所有結帳資料嗎？")) {
                isAddingMode = false;
                showRecord();
            }
        }
    </script>
</body>
</html>
