<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIPI TOYS 終極銷貨管理系統</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f6f9; color: #333; padding-bottom: 40px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 24, 38, 0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; text-align: center; }
        .login-card button { width: 100%; padding: 12px; background: #1e3c72; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* 導覽列 */
        .top-nav { background: #1e293b; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-menus button { background: #334155; color: white; border: none; padding: 8px 15px; margin-right: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-menus button:hover { background: #475569; }
        
        .container { max-width: 1400px; margin: 20px auto; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-section { display: flex; gap: 15px; background: #f8fafc; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .form-group label { font-size: 14px; font-weight: bold; color: #475569; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f1f5f9; }
        .summary-bar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; color: white; padding: 15px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .btn-checkout { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-return { padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-right: 10px;}
        
        /* 彈出視窗(通用) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 600px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { cursor: pointer; color: #ef4444; }
        .btn-submit { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- 登入遮罩 -->
<div id="site-auth-overlay" class="overlay"><div class="login-card"><h2>🔒 系統安全防護</h2><input type="password" id="site-pwd" placeholder="通關密碼"><button onclick="verifySiteAccess()">確認通關</button></div></div>
<div id="emp-login-overlay" class="overlay hidden"><div class="login-card"><h2>👤 員工上班登入</h2><input type="text" id="emp-id" placeholder="代碼 (4位)"><input type="password" id="emp-pwd" placeholder="密碼 (6位)"><button onclick="verifyEmployeeLogin()">登入系統</button></div></div>

<!-- 系統主畫面 -->
<div id="main-system" class="hidden">
    <!-- 頂部功能列 -->
    <div class="top-nav">
        <div>🧸 PIPI TOYS 系統 | 經辦: <span id="current-user" style="color:#60a5fa;">---</span></div>
        <div class="nav-menus">
            <button onclick="openModal('modal-product')">📦 建檔與進貨</button>
            <button onclick="openModal('modal-peer')">🤝 同行調貨</button>
            <button onclick="openModal('modal-report')">📊 營業額報表</button>
            <button onclick="openModal('modal-emp')">⚙️ 帳號管理</button>
        </div>
    </div>

    <!-- 結帳區塊 -->
    <div class="container">
        <h2 style="margin-bottom: 15px; color: #1e3c72;">🛒 結帳收銀作業</h2>
        <div class="input-section">
            <div class="form-group" style="flex: 2;"><label>條碼 / 自編碼 (Enter搜尋)</label><input type="text" id="inp-code" autofocus></div>
            <div class="form-group" style="flex: 2;"><label>品名</label><input type="text" id="inp-name" readonly style="background:#e2e8f0;"></div>
            <div class="form-group"><label>數量</label><input type="number" id="inp-qty" value="1"></div>
            <div class="form-group"><label>單價</label><input type="number" id="inp-price" value="0"></div>
            <div class="form-group"><label>付款方式</label>
                <select id="inp-payment" onchange="calcPrice()"><option value="現金">現金</option><option value="信用卡">信用卡</option><option value="LINE Pay">LINE Pay</option></select>
            </div>
        </div>

        <table>
            <thead><tr><th>項次</th><th>條碼</th><th>品名</th><th>單價</th><th>數量</th><th>小計</th><th>操作</th></tr></thead>
            <tbody id="cart-list"></tbody>
        </table>

        <div class="summary-bar">
            <div>總件數：<span id="lbl-total-qty">0</span> 件</div>
            <div>應收總計：<span style="color:#f59e0b; font-size:24px;">$ <span id="lbl-total-amount">0</span></span> 元</div>
            <div>
                <button class="btn-return" onclick="submitCheckout(true)">🔙 退貨處理</button>
                <button class="btn-checkout" onclick="submitCheckout(false)">💾 結帳存檔</button>
            </div>
        </div>
    </div>
</div>

<!-- ================= 彈出視窗區塊 ================= -->

<!-- 1. 建檔與進貨 -->
<div id="modal-product" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span>📦 商品建檔與進貨</span><span class="close-btn" onclick="closeModal('modal-product')">&times;</span></div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="form-group"><label>商品條碼 (必填)</label><input type="text" id="prod-barcode"></div>
            <div class="form-group"><label>自編碼 (選填)</label><input type="text" id="prod-custom"></div>
        </div>
        <div class="form-group" style="margin-bottom:10px;"><label>遊戲/商品名稱 (必填)</label><input type="text" id="prod-name"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="form-group"><label>售價</label><input type="number" id="prod-price" value="0"></div>
            <div class="form-group"><label>進貨成本</label><input type="number" id="prod-cost" value="0"></div>
            <div class="form-group"><label>進貨數量</label><input type="number" id="prod-stock" value="0"></div>
        </div>
        <button class="btn-submit" onclick="submitProduct()">💾 儲存商品 / 確認進貨</button>
    </div>
</div>

<!-- 2. 同行調貨 -->
<div id="modal-peer" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span>🤝 同行調貨紀錄</span><span class="close-btn" onclick="closeModal('modal-peer')">&times;</span></div>
        <div class="form-group" style="margin-bottom:10px;"><label>商品條碼</label><input type="text" id="peer-barcode"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="form-group"><label>同行代碼</label><input type="text" id="peer-code"></div>
            <div class="form-group"><label>同行名稱</label><input type="text" id="peer-name"></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="form-group"><label>調貨類型</label><select id="peer-type"><option value="調出">調出 (減少庫存)</option><option value="調入">調入 (增加庫存)</option></select></div>
            <div class="form-group"><label>數量</label><input type="number" id="peer-qty" value="1"></div>
        </div>
        <button class="btn-submit" onclick="submitPeer()">📝 記錄調貨並更新庫存</button>
    </div>
</div>

<!-- 3. 營業額報表 -->
<div id="modal-report" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span>📊 營業額報表查詢</span><span class="close-btn" onclick="closeModal('modal-report')">&times;</span></div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="form-group"><label>查詢日期</label><input type="date" id="rep-date"></div>
            <button onclick="fetchReport()" style="padding:10px; background:#10b981; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:20px;">🔍 查詢</button>
        </div>
        <div id="report-result" style="background:#f1f5f9; padding:15px; border-radius:6px; font-size:16px; line-height:1.8;">
            請選擇日期並點擊查詢。
        </div>
    </div>
</div>

<!-- 4. 帳號管理 -->
<div id="modal-emp" class="modal">
    <div class="modal-content" style="width:350px;">
        <div class="modal-header"><span>⚙️ 新增帳號</span><span class="close-btn" onclick="closeModal('modal-emp')">&times;</span></div>
        <div class="form-group" style="margin-bottom:10px;"><label>新代碼 (4碼)</label><input type="text" id="new-emp-id" maxlength="4"></div>
        <div class="form-group" style="margin-bottom:10px;"><label>新密碼 (6碼)</label><input type="password" id="new-emp-pwd" maxlength="6"></div>
        <button class="btn-submit" onclick="submitNewEmployee()">建立此帳號</button>
    </div>
</div>

<script>
    let cart = []; let currentProduct = null; let basePrice = 0; let activeEmployeeId = "";

    // 登入邏輯
    async function verifySiteAccess() {
        const res = await fetch('/api/verify-site-access', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: document.getElementById('site-pwd').value})});
        const data = await res.json();
        if(data.success) { document.getElementById('site-auth-overlay').classList.add('hidden'); document.getElementById('emp-login-overlay').classList.remove('hidden'); } else alert(data.message);
    }
    async function verifyEmployeeLogin() {
        const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({emp_id: document.getElementById('emp-id').value, password: document.getElementById('emp-pwd').value})});
        const data = await res.json();
        if(data.success) { activeEmployeeId = data.employee.emp_id; document.getElementById('emp-login-overlay').classList.add('hidden'); document.getElementById('main-system').classList.remove('hidden'); document.getElementById('current-user').innerText = activeEmployeeId; document.getElementById('inp-code').focus(); } else alert(data.message);
    }

    // 視窗控制
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 結帳區邏輯 (包含搜尋)
    document.getElementById('inp-code').addEventListener('keydown', async function(e) {
        if(e.key === 'Enter') {
            const res = await fetch(`/api/product/search?code=${this.value.trim()}`); const data = await res.json();
            if(data.success) { currentProduct = data.product; document.getElementById('inp-name').value = currentProduct.name; basePrice = currentProduct.price; calcPrice(); document.getElementById('inp-qty').focus(); document.getElementById('inp-qty').select(); } 
            else { alert(data.message); this.select(); }
        }
    });
    document.getElementById('inp-qty').addEventListener('keydown', function(e) { if(e.key === 'Enter') { document.getElementById('inp-price').focus(); document.getElementById('inp-price').select(); }});
    document.getElementById('inp-price').addEventListener('keydown', function(e) { if(e.key === 'Enter') addToCartList(); });

    function calcPrice() {
        const pm = document.getElementById('inp-payment').value;
        document.getElementById('inp-price').value = ["信用卡","LINE Pay"].includes(pm) ? Math.round(basePrice * 1.03) : basePrice;
    }
    function addToCartList() {
        if(!currentProduct) return;
        const qty = parseInt(document.getElementById('inp-qty').value) || 1; const price = parseFloat(document.getElementById('inp-price').value) || 0;
        cart.push({ barcode: currentProduct.barcode, name: currentProduct.name, price: price, qty: qty, subtotal: price * qty });
        renderCart(); document.getElementById('inp-code').value = ""; document.getElementById('inp-name').value = ""; document.getElementById('inp-qty').value = "1"; document.getElementById('inp-price').value = "0"; currentProduct = null; document.getElementById('inp-code').focus();
    }
    function removeCartItem(idx) { cart.splice(idx, 1); renderCart(); }
    function renderCart() {
        const tbody = document.getElementById('cart-list'); tbody.innerHTML = ""; let tq=0, ta=0;
        cart.forEach((i, idx) => { tq += i.qty; ta += i.subtotal; tbody.innerHTML += `<tr><td>${idx+1}</td><td>${i.barcode}</td><td>${i.name}</td><td>$${i.price}</td><td>${i.qty}</td><td>$${i.subtotal}</td><td><button onclick="removeCartItem(${idx})" style="color:red;cursor:pointer;border:none;background:none;">刪除</button></td></tr>`; });
        document.getElementById('lbl-total-qty').innerText = tq; document.getElementById('lbl-total-amount').innerText = ta;
    }

    // 結帳與退貨
    async function submitCheckout(isReturn) {
        if(cart.length === 0) return alert("清單為空！");
        if(isReturn && !confirm("確定要將這些商品進行「退貨」處理嗎？(這將把庫存加回去並產生負數營業額)")) return;
        
        // 如果是退貨，把數量跟金額轉成負數
        let finalCart = cart.map(item => ({...item, qty: isReturn ? -Math.abs(item.qty) : item.qty, subtotal: isReturn ? -Math.abs(item.subtotal) : item.subtotal}));
        let finalQty = parseInt(document.getElementById('lbl-total-qty').innerText) * (isReturn ? -1 : 1);
        let finalAmount = parseFloat(document.getElementById('lbl-total-amount').innerText) * (isReturn ? -1 : 1);

        const payload = { emp_id: activeEmployeeId, payment_method: document.getElementById('inp-payment').value, total_qty: finalQty, total_amount: finalAmount, items: finalCart };
        const res = await fetch('/api/sales/checkout', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        const data = await res.json();
        if(data.success) { alert(isReturn ? "✅ 退貨完成！庫存已恢復。" : data.message); cart = []; renderCart(); } else alert(data.message);
    }

    // 建檔/進貨 API
    async function submitProduct() {
        const payload = { barcode: document.getElementById('prod-barcode').value, custom_code: document.getElementById('prod-custom').value, name: document.getElementById('prod-name').value, price: document.getElementById('prod-price').value, cost: document.getElementById('prod-cost').value, stock: document.getElementById('prod-stock').value };
        if(!payload.barcode || !payload.name) return alert("條碼與名稱必填！");
        const res = await fetch('/api/product/upsert', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        const data = await res.json(); alert(data.message); if(data.success) closeModal('modal-product');
    }

    // 同行調貨 API
    async function submitPeer() {
        const payload = { barcode: document.getElementById('peer-barcode').value, peer_code: document.getElementById('peer-code').value, peer_name: document.getElementById('peer-name').value, type: document.getElementById('peer-type').value, quantity: document.getElementById('peer-qty').value };
        const res = await fetch('/api/peer/adjustment', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        const data = await res.json(); alert(data.message); if(data.success) closeModal('modal-peer');
    }

    // 營業額報表 API
    async function fetchReport() {
        const date = document.getElementById('rep-date').value; if(!date) return alert("請選擇日期");
        const res = await fetch(`/api/reports/summary?type=day&date=${date}`); const data = await res.json();
        if(data.success) {
            document.getElementById('report-result').innerHTML = `
                <b>📅 報表日期：</b> ${data.period}<br>
                <b>🧾 總交易筆數：</b> ${data.total_orders} 筆<br>
                <b>📦 總銷售件數：</b> ${data.total_qty} 件<br>
                <b>💰 總營業額：</b> <span style="color:red;font-weight:bold;">$${data.total_revenue}</span><br>
                <b>💵 現金佔比：</b> $${data.payment_breakdown["現金"] || 0}
            `;
        } else alert(data.message);
    }

    // 新增員工 API
    async function submitNewEmployee() {
        const emp_id = document.getElementById('new-emp-id').value; const password = document.getElementById('new-emp-pwd').value;
        const res = await fetch('/api/employees/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ emp_id, password }) });
        const data = await res.json(); alert(data.message); if(data.success) closeModal('modal-emp');
    }

    // 預設報表日期為今天
    document.getElementById('rep-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
